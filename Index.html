function LiveTracker(){

  var [inv,setInv]=useState(4);
  var [con,setCon]=useState(7);
  var [prop,setProp]=useState(3);
  useEffect(function(){
    function getCount(table,base,setter){
      fetch(SUPA_URL+"/rest/v1/"+table+"?select=id",{headers:{"apikey":SUPA_KEY,"Prefer":"count=exact","Range":"0-0"}}).then(function(r){
        var cr=r.headers.get("content-range");

}

function LoginForm({onSuccess,onClose}){
  var SUPA_URL="https://rgmuqduzunbpfdmuktdr.supabase.co";

  var [email,setEmail]=useState("");
  var [password,setPassword]=useState("");
  var [loading,setLoading]=useState(false);
  var [error,setError]=useState("");
  var inp={width:"100%",padding:"12px 14px",borderRadius:9,fontSize:14,border:"1.5px solid "+BRD,background:BG,color:BLK,outline:"none",lineHeight:1,boxSizing:"border-box"};

  var DEMO_ACCOUNTS={
    "demo.owner":   {password:"owner123",  role:"homeowner", name:"Maria J.",  demo:true},
    "demo.investor":{password:"investor123",role:"investor",  name:"James K.",  demo:true},
    "demo.contractor":{password:"contractor123",role:"contractor",name:"Miguel R.",demo:true},
  };

  async function handleLogin(){
    setLoading(true);setError("");
    var demo=DEMO_ACCOUNTS[email.toLowerCase().trim()];
    if(demo&&password===demo.password){
      onSuccess({token:"demo",uid:"demo",role:demo.role,name:demo.name,demo:true});
      setLoading(false);return;
    }
    try{
      var res=await fetch(SUPA_URL+"/auth/v1/token?grant_type=password",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SUPA_KEY},
        body:JSON.stringify({email:email,password:password})
      });
      var data=await res.json();
      if(data.error){setError("Invalid email or password.");setLoading(false);return;}
      var token=data.access_token;
      var uid=data.user.id;
      var profRes=await fetch(SUPA_URL+"/rest/v1/profiles?id=eq."+uid,{headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+token}});
      var prof=await profRes.json();
      var role=prof&&prof[0]?prof[0].role:"investor";
      var name=prof&&prof[0]?prof[0].name:email;
      onSuccess({token,uid,role,name,demo:false});
    }catch(e){setError("Something went wrong.");}
    setLoading(false);
  }
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

      <button onClick={handleLogin} style={{width:"100%",padding:"13px",background:email&&password?"linear-gradient(135deg,"+ROSE+","+ROSE2+")":BGA,border:"none",borderRadius:10,color:email&&password?WHT:TL,fontSize:14,fontWeight:700,cursor:email&&password?"pointer":"default"}}>
        {loading?"Signing in...":"Sign In"}

                    <input style={inp} placeholder="you@email.com" value={email} onChange={function(e){setEmail(e.target.value);}}/>
                  </div>
                  <div style={{background:RF,border:"1px solid "+RB,borderRadius:10,padding:"12px 14px",fontSize:12,color:TM}}>No upfront cost. Your information is never shared. FundFlip only earns when you do.</div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={function(){setStep(2);}} style={{padding:"13px 18px",borderRadius:10,border:"1px solid "+BRD,background:WHT,color:TMU,fontSize:13,cursor:"pointer"}}>Back</button>
                    <button onClick={function(){if(name&&phone&&email)submit();}} style={{flex:1,padding:"13px",borderRadius:10,border:"none",fontSize:14,fontWeight:700,cursor:name&&phone&&email?"pointer":"default",background:name&&phone&&email?"linear-gradient(135deg,"+ROSE+","+ROSE2+")":BGA,color:name&&phone&&email?WHT:TL}}>{saving?"Submitting...":"Get My Free ARV Estimate"}</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  var [view,setView]=useState("landing");
  var [splash,setSplash]=useState(true);
  var [fadeOut,setFadeOut]=useState(false);
  var [landingVis,setLandingVis]=useState(false);
  var [selectedDeal,setSelectedDeal]=useState(null);
  var [user,setUser]=useState(null);
  var [prefillEmail,setPrefillEmail]=useState("");
  var [authInitRole,setAuthInitRole]=useState("");
  useEffect(function(){
    document.title="FundFlip — We Find It. You Fund It. We Sell It.";
    setTimeout(function(){setFadeOut(true);},1700);
    setTimeout(function(){setSplash(false);setTimeout(function(){setLandingVis(true);},50);},2000);
  },[]);
  function handleAuthSuccess(userData){
    setUser(userData);
    if(userData.role==="homeowner")setView("owner");
    else if(userData.role==="contractor")setView("contractor");
    else setView("investor");
  }
  function handleLogout(){
    setUser(null);
    setView("landing");
  }
  if(splash) return(
    <div style={{minHeight:"100vh",background:BLK,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Inter,sans-serif",opacity:fadeOut?0:1,transition:"opacity 0.5s ease"}}>
      <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,"+ROSE+","+ROSE2+")",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
        <span style={{fontSize:20,color:WHT,fontWeight:900}}>FF</span>
      </div>
      <span style={{fontWeight:900,fontSize:24,letterSpacing:"-0.04em",color:WHT}}>Fund<span style={{color:ROSE}}>Flip</span></span>
      <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:6,fontWeight:500}}>AI Powered. Human Backed.</span>
    </div>
  );
  return(
    <div style={{opacity:landingVis?1:0,transform:landingVis?"none":"translateY(12px)",transition:"opacity 0.7s ease, transform 0.7s ease"}}>
      {view==="landing"&&<Landing onDash={function(){setView("auth");}} onOwner={function(){setView("listing");}} onContractor={function(){setView("contractor-apply");}} onInvestor={function(){setView("auth");}} onLogin={handleAuthSuccess} onSignUp={function(role){setAuthInitRole(role);setView("auth-register");}}/>}
      {view==="listing"&&<ListingFlow onBack={function(){setView("landing");}} onCreateAccount={function(em){setPrefillEmail(em);setView("auth");}}/>}
      {view==="auth"&&<AuthPage onSuccess={handleAuthSuccess} prefillEmail={prefillEmail} initMode="login" onBack={function(){setView("landing");}}/>}
      {view==="auth-register"&&<AuthPage onSuccess={handleAuthSuccess} initMode="register" initRole={authInitRole} onBack={function(){setView("landing");}}/>}
      {view==="contractor"&&user&&<ContractorDash onBack={handleLogout} demo={user.demo} name={user.name}/>}
      {view==="contractor-apply"&&<ContractorSignup onBack={function(){setView("landing");}}/>}
      {view==="investor"&&<InvestorDash onBack={handleLogout} onDeal={function(d){setSelectedDeal(d);setView("dealroom");}} demo={user&&user.demo} name={user&&user.name}/>}
      {view==="owner"&&<OwnerDash onBack={handleLogout} demo={user&&user.demo} name={user&&user.name}/>}
      {view==="dealroom"&&selectedDeal&&<DealRoom d={selectedDeal} onBack={function(){setView("investor");}}/>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
