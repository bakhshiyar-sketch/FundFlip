  var scope=[["Kitchen full gut + remodel","$18,500"],["2 bathrooms","$9,200"],["Flooring throughout","$7,800"],["Roof repair","$4,500"],["Exterior paint","$3,200"],["HVAC service","$2,800"],["Contingency 5%","$2,400"]];
  var milestones=[{n:"M1",label:"Demolition",pct:"20%",done:true},{n:"M2",label:"Rough-In",pct:"25%",done:true},{n:"M3",label:"Finishes",pct:"35%",done:false},{n:"M4",label:"Final Inspection",pct:"20%",done:false}];
  return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:"Inter,sans-serif",color:BLK}}>
      <div style={{background:WHT,borderBottom:"1px solid "+BRD,padding:"0 5%",height:48,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:200}}>
        <button onClick={onBack} style={{background:BG,border:"1px solid "+BRD,borderRadius:6,padding:"5px 12px",color:TMU,fontSize:12,cursor:"pointer"}}>{"← Back"}</button>
        <span style={{fontWeight:900,fontSize:14,letterSpacing:"-0.03em",color:BLK}}>Fund<span style={{color:ROSE}}>Flip</span></span>
        <div style={{width:60}}/>
      </div>
      <div style={{maxWidth:680,margin:"0 auto",padding:"24px 5% 60px"}}>
        <div style={{position:"relative",height:200,borderRadius:16,overflow:"hidden",marginBottom:20}}>
          <img src={d.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.8)"}}/>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(9,9,11,0.8) 0%,transparent 50%)"}}/>
          <div style={{position:"absolute",bottom:16,left:20}}>
            <Chip label={d.tag} v="gray"/>
            <div style={{fontWeight:900,fontSize:20,color:WHT,marginTop:6}}>{d.addr}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>{d.city}</div>
          </div>
          <div style={{position:"absolute",top:12,right:12,background:d.status==="funded"?GRN:ROSE,color:WHT,fontSize:10,fontWeight:700,padding:"4px 12px",borderRadius:99}}>{d.status==="funded"?"FUNDED":"OPEN"}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[["Current Value",K(d.arv-d.profit)],["After Repair",K(d.arv)],["Rehab Cost",K(d.rehab)],["Net Profit",K(d.profit)]].map(function(item){return(
            <div key={item[0]} style={{background:WHT,border:"1px solid "+BRD,borderRadius:12,padding:"14px 12px",textAlign:"center"}}>
              <div style={{fontSize:9,color:TL,textTransform:"uppercase",marginBottom:6}}>{item[0]}</div>
              <div style={{fontSize:15,fontWeight:800,color:item[0]==="Net Profit"?ROSE:BLK}}>{item[1]}</div>
            </div>
          );})}
        </div>
        <div style={{background:WHT,border:"1px solid "+BRD,borderRadius:14,marginBottom:14,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:"1px solid "+BRD,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:14,color:BLK}}>ARV Report</div>
            <span style={{fontSize:10,color:GRN,fontWeight:700,background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:99,padding:"3px 10px"}}>Certified</span>
          </div>
          <div style={{padding:"14px 18px"}}>
            {[["Appraiser","Marcus Reid, MAI Certified"],["Method","Sales comparison + income approach"],["Comparable Sales","3 comps within 0.5 miles"],["Final ARV",K(d.arv)+" confirmed"],["Ordered By","FundFlip, independent of investor"]].map(function(row){return(
              <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+BRD}}>
                <span style={{fontSize:12,color:TMU}}>{row[0]}</span>
                <span style={{fontSize:12,fontWeight:600,color:BLK,textAlign:"right",maxWidth:"55%"}}>{row[1]}</span>
              </div>
            );})}
          </div>
        </div>
        <div style={{background:WHT,border:"1px solid "+BRD,borderRadius:14,marginBottom:14,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:"1px solid "+BRD,fontWeight:700,fontSize:14,color:BLK}}>Contractor Profile</div>
          <div style={{padding:"14px 18px"}}>
            {[["Company","Rodriguez Construction LLC"],["License","CA 891234, Active"],["Insurance","$2M General Liability, Verified"],["FundFlip Deals","4 completed, avg 97% on-budget"],["Bids Received","3 competitive bids"]].map(function(row){return(
              <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+BRD}}>
                <span style={{fontSize:12,color:TMU}}>{row[0]}</span>
                <span style={{fontSize:12,fontWeight:600,color:BLK,textAlign:"right",maxWidth:"55%"}}>{row[1]}</span>
              </div>
            );})}
          </div>
        </div>
        <div style={{background:WHT,border:"1px solid "+BRD,borderRadius:14,marginBottom:14,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:"1px solid "+BRD,fontWeight:700,fontSize:14,color:BLK}}>Scope of Work</div>
          <div style={{padding:"14px 18px"}}>
            {scope.map(function(row){return(
              <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+BRD}}>
                <span style={{fontSize:12,color:TM}}>{row[0]}</span>
                <span style={{fontSize:12,fontWeight:600,color:BLK}}>{row[1]}</span>
              </div>
            );})}
            <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0 0"}}>
              <span style={{fontSize:13,fontWeight:700,color:BLK}}>Total Locked Budget</span>
              <span style={{fontSize:13,fontWeight:800,color:ROSE}}>{K(d.rehab)}</span>
            </div>
          </div>
        </div>
        <div style={{background:WHT,border:"1px solid "+BRD,borderRadius:14,marginBottom:14,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:"1px solid "+BRD,fontWeight:700,fontSize:14,color:BLK}}>Milestone Timeline</div>
          <div style={{padding:"14px 18px"}}>
            {milestones.map(function(m,i){return(
              <div key={i} style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:i<milestones.length-1?16:0}}>
                <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:m.done?ROSE:BGA,border:m.done?"none":"2px solid "+BRD,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {m.done?<span style={{color:WHT,fontSize:11,fontWeight:800}}>{"✓"}</span>:<span style={{fontSize:10,fontWeight:700,color:TL}}>{m.n}</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontSize:13,fontWeight:600,color:BLK}}>{m.label}</span>
                    <span style={{fontSize:11,color:m.done?GRN:TL,fontWeight:600,textTransform:"uppercase"}}>{m.done?"Complete":"Pending"}</span>
                  </div>
                  <div style={{fontSize:11,color:TL}}>{m.pct+" of budget"}</div>
                </div>
              </div>
            );})}
          </div>
        </div>
        {!funded?(
          <div style={{background:RF,border:"1px solid "+RB,borderRadius:14,padding:20}}>
            <div style={{fontWeight:800,fontSize:18,color:BLK,marginBottom:4}}>Fund This Deal</div>
            <div style={{fontSize:13,color:TMU,marginBottom:16}}>Your funds go directly into milestone escrow. Released in 4 stages only after you approve completed work.</div>
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:12,color:TM,fontWeight:600}}>Your investment</span>
                <span style={{fontSize:14,fontWeight:800,color:BLK}}>{"$"+amt.toLocaleString()}</span>
              </div>
              <input type="range" min="1000" max={d.rehab} step="500" value={amt} onChange={function(e){setAmt(Number(e.target.value));}} style={{width:"100%",accentColor:ROSE,cursor:"pointer"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {[["Your Share",(amt/d.rehab*100).toFixed(1)+"%"],["Est. Return","$"+Math.round(amt*(d.roi/100)).toLocaleString()],["ROI","~"+d.roi+"%"],["Timeline","~4 months"]].map(function(item){return(
                <div key={item[0]} style={{background:WHT,borderRadius:10,padding:"10px 12px",border:"1px solid "+RB}}>
                  <div style={{fontSize:9,color:ROSE,textTransform:"uppercase",marginBottom:3}}>{item[0]}</div>
                  <div style={{fontSize:15,fontWeight:800,color:BLK}}>{item[1]}</div>
                </div>
              );})}
            </div>
            <button onClick={function(){setFunded(true);}} style={{width:"100%",padding:"15px",background:"linear-gradient(135deg,"+ROSE+","+ROSE2+")",border:"none",borderRadius:12,color:WHT,fontSize:15,fontWeight:800,cursor:"pointer"}}>
              {"Fund $"+amt.toLocaleString()+" \u2014 Escrow Protected"}
            </button>
          </div>
        ):(
          <div style={{background:BLK,borderRadius:14,padding:28,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>{"🎉"}</div>
            <div style={{fontWeight:800,fontSize:20,color:WHT,marginBottom:8}}>{"You're in!"}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",lineHeight:1.7,marginBottom:20}}>{"$"+amt.toLocaleString()+" has been reserved in escrow. The JV contract will be generated within 24 hours."}</div>
            <button onClick={onBack} style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,"+ROSE+","+ROSE2+")",border:"none",borderRadius:10,color:WHT,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:10}}>Go to Dashboard</button>
            <button onClick={function(){
              if(navigator.share){navigator.share({title:"FundFlip",text:"I just funded a real estate deal on FundFlip. AI-matched, escrow-protected, 40% of the profit.",url:"https://fundflip.com"});}
              else{navigator.clipboard&&navigator.clipboard.writeText("https://fundflip.com");}
            }} style={{width:"100%",padding:"12px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,color:"rgba(255,255,255,0.8)",fontSize:13,fontWeight:600,cursor:"pointer"}}>{"Share FundFlip with another investor \u2197"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  var [view,setView]=useState("landing");
  var [splash,setSplash]=useState(true);
  var [fadeOut,setFadeOut]=useState(false);
  var [landingVis,setLandingVis]=useState(false);
  var [selectedDeal,setSelectedDeal]=useState(null);
  useEffect(function(){
    document.title="FundFlip \u2014 AI-Powered Inherited Home Investment";
    setTimeout(function(){setFadeOut(true);},1700);
    setTimeout(function(){setSplash(false);setTimeout(function(){setLandingVis(true);},50);},2000);
  },[]);
  if(splash) return(
    <div style={{minHeight:"100vh",background:BLK,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Inter,sans-serif",opacity:fadeOut?0:1,transition:"opacity 0.5s ease"}}>
      <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,"+ROSE+","+ROSE2+")",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
        <span style={{fontSize:20,color:WHT,fontWeight:900}}>FF</span>
      </div>
      <span style={{fontWeight:900,fontSize:24,letterSpacing:"-0.04em",color:WHT}}>Fund<span style={{color:ROSE}}>Flip</span></span>
      <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:6,fontWeight:500}}>AI Powered. Human Backed.</span>
    </div>
  );
  return(
    <div style={{opacity:landingVis?1:0,transform:landingVis?"none":"translateY(12px)",transition:"opacity 0.7s ease, transform 0.7s ease"}}>
      {view==="landing"&&<Landing onDash={function(){setView("role");}}/>}
      {view==="role"&&<RoleSelector onInvestor={function(){setView("investor");}} onOwner={function(){setView("owner");}} onBack={function(){setView("landing");}}/>}
      {view==="investor"&&<InvestorDash onBack={function(){setView("role");}} onDeal={function(d){setSelectedDeal(d);setView("dealroom");}}/>}
      {view==="owner"&&<OwnerDash onBack={function(){setView("role");}}/>}
      {view==="dealroom"&&selectedDeal&&<DealRoom d={selectedDeal} onBack={function(){setView("investor");}}/>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
